<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мопс Кликер</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
  <div class="room">
    <div class="wall"></div>
    <div class="floor"></div>
    
    <div class="app">
      <header>
        <div class="currency">🦴 <span id="ui-kibble">0</span></div>
        <div class="mult-badge" id="ui-mult">x1.00</div>
      </header>

      <main class="game">
        <div class="boost-bar" id="ui-boost" style="display:none">⚡ <span id="ui-boost-time"></span></div>
        
        <!-- СЦЕНА КОМНАТЫ -->
        <div class="scene">
          <!-- Декор (Задний план) -->
          <div id="dec-wardrobe" class="deco" style="display:none; z-index:1;">🚪</div> <!-- Шкаф слева -->
          <div id="dec-window" class="deco" style="display:none; z-index:1;">🪟</div>   <!-- Окно справа -->
          <div id="dec-lamp" class="deco" style="display:none; z-index:1;">💡</div>    <!-- Лампа сверху слева -->
          
          <!-- Коврик (Пол) -->
          <div id="mat-rug" class="rug" style="display:none; z-index:2;"></div>

          <!-- Игрушки (Средний план) -->
          <div id="toy-ball" class="toy" style="display:none; z-index:3;">⚽</div>
          <div id="toy-bone" class="toy" style="display:none; z-index:3;">🦴</div>
          
          <!-- Мопс (Передний план, Центр) -->
          <div id="click-zone" class="pug-container" style="z-index:10;">
            <!-- 📍 Ссылка на картинку мопса -->
            <img src="https://cdn-icons-png.flaticon.com/512/3175/3175661.png" alt="Мопс" class="pug-img">
          </div>
        </div>
        
        <div id="float-container"></div>
      </main>

      <nav class="bottom-nav">
        <button data-open="shop">🛒</button>
        <button data-open="inventory">🎒</button>
        <button data-open="stats">📊</button>
      </nav>
    </div>
  </div>

  <!-- МЕНЮ -->
  <div id="overlay"></div>

  <div id="modal-shop" class="modal">
    <div class="modal-head"><h3>Магазин</h3><button class="close">&times;</button></div>
    <div class="tabs">
      <button class="tab active" data-tab="up">⚡ Прокачка</button>
      <button class="tab" data-tab="food">🍖 Еда</button>
      <button class="tab" data-tab="case">📦 Кейсы</button>
      <button class="tab" data-tab="furn">🛋️ Мебель</button>
    </div>
    <div id="shop-list"></div>
  </div>

  <div id="modal-inventory" class="modal">
    <div class="modal-head"><h3>Инвентарь</h3><button class="close">&times;</button></div>
    <div class="slots-info">
      <div class="slot-box">🛏️ <span id="slot-mat">0/1</span></div>
      <div class="slot-box">🧸 <span id="slot-toy">0/2</span></div>
      <div class="slot-box">🖼️ <span id="slot-dec">0/3</span></div>
    </div>
    <div id="inv-items"></div>
  </div>

  <div id="modal-stats" class="modal">
    <div class="modal-head"><h3>Стата</h3><button class="close">&times;</button></div>
    <ul id="stats-list"></ul>
  </div>

  <script src="main.js"></script>
</body>
</html>
