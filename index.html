<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мопс Кликер</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
  <div class="room">
    <div class="wall"></div>
    <div class="floor"></div>
    
    <div class="app">
      <!-- Верхняя панель -->
      <header>
        <div class="currency">🦴 <span id="ui-kibble">0</span></div>
        <div class="mult-badge" id="ui-mult">x1.00</div>
      </header>

      <!-- Игровая зона -->
      <main class="game">
        <div class="boost-bar" id="ui-boost" style="display:none">⚡ <span id="ui-boost-time"></span></div>
        
        <!-- КЛИКАБЕЛЬНАЯ ЗОНА -->
        <div id="click-zone" class="click-zone">
          <img src="https://cdn-icons-png.flaticon.com/512/3175/3175661.png" alt="🐶" class="pug-img">
        </div>
        
        <div id="float-container"></div>
      </main>

      <!-- Нижнее меню -->
      <nav class="bottom-nav">
        <button data-open="shop">🛒</button>
        <button data-open="inventory">🎒</button>
        <button data-open="stats">📊</button>
      </nav>
    </div>
  </div>

  <!-- Оверлей и модальные окна -->
  <div id="overlay"></div>

  <!-- Магазин -->
  <div id="modal-shop" class="modal">
    <div class="modal-head"><h3>Магазин</h3><button class="close">&times;</button></div>
    <div class="tabs">
      <button class="tab active" data-tab="up">⚡</button>
      <button class="tab" data-tab="food">🍖</button>
      <button class="tab" data-tab="case">📦</button>
      <button class="tab" data-tab="furn">🛋️</button>
    </div>
    <div id="shop-list"></div>
  </div>

  <!-- Инвентарь -->
  <div id="modal-inventory" class="modal">
    <div class="modal-head"><h3>Инвентарь</h3><button class="close">&times;</button></div>
    <div id="inv-slots"></div>
    <div id="inv-items"></div>
  </div>

  <!-- Статистика -->
  <div id="modal-stats" class="modal">
    <div class="modal-head"><h3>Стата</h3><button class="close">&times;</button></div>
    <ul id="stats-list"></ul>
  </div>

  <script src="main.js"></script>
</body>
</html>
