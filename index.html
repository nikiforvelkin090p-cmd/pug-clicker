<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мопс Кликер</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
  <div class="room">
    <div class="wall"></div>
    <div class="floor"></div>
    
    <div class="app">
      <header>
        <div class="currency">🦴 <span id="ui-kibble">0</span></div>
        <div class="mult-badge" id="ui-mult">x1.00</div>
      </header>

      <main class="game">
        <div class="boost-bar" id="ui-boost" style="display:none">⚡ БУСТ АКТИВЕН <span id="ui-boost-time">00:00</span></div>
        <div class="click-zone" id="click-zone">
          <img id="pug-img" src="https://cdn-icons-png.flaticon.com/512/3175/3175661.png" alt="Мопс" class="pug-character">
        </div>
        <div id="float-texts"></div>
      </main>

      <nav class="bottom-nav">
        <button data-modal="shop">🛒 Магазин</button>
        <button data-modal="inventory">🎒 Инвентарь</button>
        <button data-modal="stats">📊 Стата</button>
      </nav>
    </div>
  </div>

  <div id="overlay" class="overlay"></div>

  <!-- Магазин -->
  <div id="modal-shop" class="modal">
    <div class="modal-header">
      <h2>Магазин</h2>
      <button class="close-btn">&times;</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="upgrades">⚡ Клик</button>
      <button class="tab" data-tab="food">🍖 Еда</button>
      <button class="tab" data-tab="cases">📦 Кейсы</button>
      <button class="tab" data-tab="furniture">🛋️ Мебель</button>
    </div>
    <div class="tab-content" id="shop-content"></div>
  </div>

  <!-- Инвентарь -->
  <div id="modal-inventory" class="modal">
    <div class="modal-header">
      <h2>Инвентарь</h2>
      <button class="close-btn">&times;</button>
    </div>
    <div class="inv-slots">
      <div class="slot-group">
        <h3>Подстилка (1/1)</h3>
        <div id="slot-mat" class="slot"></div>
      </div>
      <div class="slot-group">
        <h3>Игрушки (0/2)</h3>
        <div id="slot-toy1" class="slot"></div>
        <div id="slot-toy2" class="slot"></div>
      </div>
      <div class="slot-group">
        <h3>Декор (0/3)</h3>
        <div id="slot-decor1" class="slot"></div>
        <div id="slot-decor2" class="slot"></div>
        <div id="slot-decor3" class="slot"></div>
      </div>
    </div>
    <div class="inv-list" id="inv-list"></div>
  </div>

  <!-- Статистика -->
  <div id="modal-stats" class="modal">
    <div class="modal-header">
      <h2>Статистика</h2>
      <button class="close-btn">&times;</button>
    </div>
    <ul class="stats-list" id="stats-list"></ul>
  </div>

  <script src="main.js"></script>
</body>
</html>
